---
- name: Rdiff-backup Tasks
  tags: [never, server, workstation]
  block:
    - name: Generate Backup Variables
      ansible.builtin.include_tasks: autovars.yml

    - name: Collect current backup datetime
      ansible.builtin.command:
        cmd: date "+%Y-%m-%d %H:%M:%S"
      register: backup_datetime_reg

    - name: "Write datetime to {{ backup_log_filename }}"
      ansible.builtin.shell:
        cmd: >-
          echo Backup for {{ inventory_hostname_short }}
          started: {{ backup_datetime_reg.stdout }} > {{ backup_log_file_path }}

    - name: Debug task - Print - backup_datetime_reg variable
      tags: [never, debug]
      ansible.builtin.debug:
        var: backup_datetime_reg.stdout

    - name: Run rdiff-backup cmd to push data to destination machine
      ansible.builtin.shell:
        cmd: >-
          rdiff-backup {{ backup_flags }} --include {{ item }}
          {{ backup_exclude_options }} {{ backup_source_dir }}
          {{ backup_dest_path }}/{{ inventory_hostname_short }}{{ item | regex_replace('\\/', '-') }}
          >> {{ backup_log_file_path }} 2>&1
        executable: /bin/bash
      loop: "{{ backup_include }}"
      register: backup_rdiff_debug

    - name: Debug task - Print - backup_rdiff_debug variable - rdiff-backup cmd output
      tags: [never, debug]
      ansible.builtin.debug:
        var: backup_rdiff_debug

